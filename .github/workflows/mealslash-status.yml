name: Mealslash Status Monitor

on:
  repository_dispatch:
    types: [status-check]
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure status file exists
        run: |
          if [ ! -f status.txt ]; then
            echo "closed" > status.txt
          fi

      - name: Check Mealslash status and send Discord alerts
        env:
          DISCORD_WEBHOOK_URL_1: ${{ secrets.DISCORD_WEBHOOK_URL_1 }}
          DISCORD_WEBHOOK_URL_2: ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
          DISCORD_WEBHOOK_URL_3: ${{ secrets.DISCORD_WEBHOOK_URL_3 }}
          DISCORD_WEBHOOK_URL_4: ${{ secrets.DISCORD_WEBHOOK_URL_4 }}
          DISCORD_WEBHOOK_URL_5: ${{ secrets.DISCORD_WEBHOOK_URL_5 }}
          TARGET_URL: https://www.mealslash.com/order/food-delivery
        run: |
          set -euo pipefail

          page_content="$(curl -L -s -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" "$TARGET_URL")"
          page_text="$(echo "$page_content" | tr -d '\r' | tr '\n' ' ' | tr -s ' ')"

          if echo "$page_text" | grep -Eiq "we('?|&rsquo;|&#39;)?re currently closed"; then
            scraped_status="closed"
          else
            scraped_status="open"
          fi

          current_status="$(tr -d '\r\n' < status.txt | tr '[:upper:]' '[:lower:]')"
          if [ "$current_status" != "open" ] && [ "$current_status" != "closed" ]; then
            current_status="closed"
          fi

          if [ "$scraped_status" = "$current_status" ]; then
            echo "No status change. Current status: $current_status"
            exit 0
          fi

          if [ "$scraped_status" = "open" ]; then
            message="@Chuds Mealslash is now open!"
          else
            message="@Chuds Mealslash is now closed."
          fi

          payload=$(printf '{"content":"%s"}' "$message")
          sent_any=false

          for webhook in \
            "${DISCORD_WEBHOOK_URL_1:-}" \
            "${DISCORD_WEBHOOK_URL_2:-}" \
            "${DISCORD_WEBHOOK_URL_3:-}" \
            "${DISCORD_WEBHOOK_URL_4:-}" \
            "${DISCORD_WEBHOOK_URL_5:-}"
          do
            if [ -n "$webhook" ]; then
              curl -H "Content-Type: application/json" -d "$payload" "$webhook"
              sent_any=true
            fi
          done

          if [ "$sent_any" = false ]; then
            echo "No Discord webhook URLs configured; skipping notification."
          fi

          echo "$scraped_status" > status.txt

      - name: Commit updated status
        run: |
          if git diff --quiet -- status.txt; then
            echo "No status.txt changes to commit."
            exit 0
          fi

          git add status.txt
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update mealslash status"
          git push
