name: Mealslash Status Monitor

on:
  repository_dispatch:
    types: [check-cron-jobs]
  workflow_dispatch:

concurrency:
  group: mealslash-status-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure status file exists
        run: |
          if [ ! -f status.txt ]; then
            echo "closed" > status.txt
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright >/dev/null 2>&1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check Mealslash status and send Discord alerts
        env:
          DISCORD_WEBHOOK_URL_1: ${{ secrets.DISCORD_WEBHOOK_URL_1 }}
          DISCORD_WEBHOOK_URL_2: ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
          DISCORD_WEBHOOK_URL_3: ${{ secrets.DISCORD_WEBHOOK_URL_3 }}
          DISCORD_WEBHOOK_URL_4: ${{ secrets.DISCORD_WEBHOOK_URL_4 }}
          DISCORD_WEBHOOK_URL_5: ${{ secrets.DISCORD_WEBHOOK_URL_5 }}
          TARGET_URL: https://www.mealslash.com/order/food-delivery
        run: |
          set -euo pipefail

          rendered_text="$(TARGET_URL="$TARGET_URL" node -e "const { chromium } = require('playwright'); (async () => { const browser = await chromium.launch({headless: true}); const page = await browser.newPage(); await page.goto(process.env.TARGET_URL, {waitUntil: 'networkidle', timeout: 60000}); await page.waitForTimeout(10000); const text = await page.locator('body').innerText(); console.log(text); await browser.close(); })().catch((e)=>{ console.error(e); process.exit(1); });")"

          if echo "$rendered_text" | grep -Eiq "we('?|’)?re currently closed"; then
            scraped_status="closed"
          else
            scraped_status="open"
          fi

          current_status="$(tr -d '\r\n' < status.txt | tr '[:upper:]' '[:lower:]')"
          if [ "$current_status" != "open" ] && [ "$current_status" != "closed" ]; then
            current_status="closed"
          fi

          if [ "$scraped_status" = "$current_status" ]; then
            echo "No status change. Current status: $current_status"
            exit 0
          fi

          if [ "$scraped_status" = "open" ]; then
            message="<@&1475611796219101404> Mealslash is now open!"
          else
            message="<@&1475611796219101404> Mealslash is now closed."
          fi

          payload=$(printf '{"content":"%s"}' "$message")
          sent_any=false

          for webhook in \
            "${DISCORD_WEBHOOK_URL_1:-}" \
            "${DISCORD_WEBHOOK_URL_2:-}" \
            "${DISCORD_WEBHOOK_URL_3:-}" \
            "${DISCORD_WEBHOOK_URL_4:-}" \
            "${DISCORD_WEBHOOK_URL_5:-}"
          do
            if [ -n "$webhook" ]; then
              curl -H "Content-Type: application/json" -d "$payload" "$webhook"
              sent_any=true
            fi
          done

          if [ "$sent_any" = false ]; then
            echo "No Discord webhook URLs configured; skipping notification."
          fi

          echo "$scraped_status" > status.txt

      - name: Commit updated status
        run: |
          if git diff --quiet -- status.txt; then
            echo "No status.txt changes to commit."
            exit 0
          fi

          git add status.txt
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update mealslash status"
          git push
